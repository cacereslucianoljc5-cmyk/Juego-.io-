<!doctype html><html><body><script type="module">
window.__state = { frames: 0, lost: null, lostAt: -1, mode: new URLSearchParams(location.search).get('mode') ?? 'present' };
const adapter = await navigator.gpu.requestAdapter();
const device = await adapter.requestDevice();
device.lost.then(i => { window.__state.lost = i.reason; window.__state.lostAt = window.__state.frames; console.error('LOST at frame', window.__state.frames); });
const mode = window.__state.mode;
let ctx = null;
if (mode === 'present') {
  const canvas = document.createElement('canvas');
  canvas.width = 320; canvas.height = 200;
  document.body.appendChild(canvas);
  ctx = canvas.getContext('webgpu');
  ctx.configure({ device, format: navigator.gpu.getPreferredCanvasFormat() });
}
const off = device.createTexture({ size: [320, 200], format: 'rgba8unorm', usage: GPUTextureUsage.RENDER_ATTACHMENT });
const offView = off.createView();
function frame(t) {
  const enc = device.createCommandEncoder();
  const view = mode === 'present' ? ctx.getCurrentTexture().createView() : offView;
  const pass = enc.beginRenderPass({ colorAttachments: [{ view, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.2, b: 0.3, a: 1 } }] });
  pass.end();
  device.queue.submit([enc.finish()]);
  window.__state.frames++;
  if (mode === 'raf') { requestAnimationFrame(frame); return; }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
console.log('probe running mode=' + mode);
</script></body></html>
